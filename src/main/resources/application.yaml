spring:
  application:
    name: landingpage

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  thymeleaf:
    cache: false

  mvc:
    hiddenmethod:
      filter:
        enabled: true

server:
  port: 8080

logging:
  level:
    root: INFO
    org.springframework.security: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info